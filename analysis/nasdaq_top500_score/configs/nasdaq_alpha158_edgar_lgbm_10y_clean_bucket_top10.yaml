experiment:
  name: nasdaq_alpha158_edgar_lgbm_10y_clean_bucket_top10
  output_dir: analysis/nasdaq_top500_score/runs/nasdaq_alpha158_edgar_lgbm_10y_clean_bucket_top10

universe:
  exchange: NASDAQ
  top_n_by_market_cap: 500
  exclude_etf: true
  exclude_test_issue: true
  min_history_rows: 180
  security_filter:
    enabled: true
    exclude_symbol_regexes:
      - ".*W$"
      - ".*WS$"
      - ".*WT$"
      - ".*WW$"

data:
  source: nasdaq_public
  start_date: "2016-05-17"
  end_date: "2026-05-17"
  freq: day
  vwap_method: ohlc_mean

fundamentals:
  enabled: true
  source: sec_edgar
  cache_dir: analysis/nasdaq_top500_score/runs/nasdaq_alpha158_edgar_lgbm_10y_eval_all/edgar_cache
  forms:
    - 10-K
    - 10-Q
    - 10-K/A
    - 10-Q/A
  min_filing_count: 4
  enable_valuation: true
  recent_filing_days: 5

history_buckets:
  enabled: true
  thresholds:
    full_10y: 2400
    5_10y: 1260
    2_5y: 504
    lt_2y: 180

bucket_ranking:
  enabled: true
  quotas:
    full_10y: 4
    5_10y: 3
    2_5y: 2
    lt_2y: 1
  refill_order:
    - full_10y
    - 5_10y
    - 2_5y
    - lt_2y

label:
  expression: Ref($close, -2) / Ref($close, -1) - 1
  name: LABEL0

features:
  handler: Alpha158
  instruments: all

split:
  method: date
  warmup_days: 60
  train:
    start: "2016-05-17"
    end: "2021-12-31"
  valid:
    start: "2022-01-01"
    end: "2023-12-31"
  test:
    start: "2024-01-01"
    end: "2026-05-17"

model:
  class: LGBModel
  kwargs:
    loss: mse
    learning_rate: 0.05
    num_leaves: 64
    max_depth: 8
    n_estimators: 300
    subsample: 0.85
    colsample_bytree: 0.85
    lambda_l1: 1.0
    lambda_l2: 10.0
    num_threads: 8

report:
  top_n: 10
