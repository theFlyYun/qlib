experiment:
  name: norgate_sp500_alpha158_lgbm_1d
  output_dir: analysis/nasdaq_top500_score/runs/norgate_sp500_alpha158_lgbm_1d

universe:
  provider: norgate
  index_name: S&P 500
  index_symbol: $SPX
  candidate_databases:
    - US Equities
    - US Equities Delisted
  include_delisted: true
  min_history_rows: 180

data:
  source: norgate
  start_date: 1990-01-01
  end_date: latest
  freq: day
  price_adjustment: TOTALRETURN
  padding: NONE
  vwap_method: ohlc_mean

label:
  expression: Ref($close, -2) / Ref($close, -1) - 1
  name: LABEL0

features:
  handler: Alpha158
  instruments: all

split:
  method: ratio
  train_ratio: 0.62
  valid_ratio: 0.18
  test_ratio: 0.20
  warmup_days: 60

model:
  class: LGBModel
  kwargs:
    loss: mse
    learning_rate: 0.05
    num_leaves: 64
    max_depth: 8
    n_estimators: 300
    subsample: 0.85
    colsample_bytree: 0.85
    lambda_l1: 1.0
    lambda_l2: 10.0
    num_threads: 8

report:
  top_n: 5
