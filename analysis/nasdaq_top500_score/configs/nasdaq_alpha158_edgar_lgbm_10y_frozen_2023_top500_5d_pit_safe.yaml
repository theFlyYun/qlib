experiment:
  name: nasdaq_alpha158_edgar_lgbm_10y_frozen_2023_top500_5d_pit_safe
  output_dir: analysis/nasdaq_top500_score/runs/nasdaq_alpha158_edgar_lgbm_10y_frozen_2023_top500_5d_pit_safe

universe:
  exchange: NASDAQ
  top_n_by_market_cap: 500
  exclude_etf: true
  exclude_test_issue: true
  min_history_rows: 180
  selection:
    method: approximate_market_cap_asof
    as_of_date: "2023-12-31"
    candidate_top_n_by_current_market_cap: 1000
  security_master:
    enabled: true
    source: nasdaq_public
    allowed_asset_types:
      - common_stock
      - ordinary_share
      - adr_ads
      - unknown_equity_like
    allow_adr_ads: true
    require_not_etf: true
    require_not_test_issue: true

data:
  source: nasdaq_public
  start_date: "2016-05-17"
  end_date: "2026-05-17"
  freq: day
  vwap_method: ohlc_mean

fundamentals:
  enabled: true
  source: sec_edgar
  cache_dir: analysis/nasdaq_top500_score/runs/nasdaq_alpha158_edgar_lgbm_10y_eval_all/edgar_cache
  forms:
    - 10-K
    - 10-Q
    - 10-K/A
    - 10-Q/A
  min_filing_count: 4
  enable_valuation: true
  recent_filing_days: 5

market_features:
  enabled: true
  source: qlib_source_csv
  group_levels:
    - sector
    - industry
  min_group_size: 5
  dollar_volume_windows:
    - 20
    - 60
  momentum_windows:
    - 20
    - 60
    - 120
  volatility_windows:
    - 20
    - 60
  relative_features:
    - log_close
    - log_avg_dollar_volume_20d
    - log_median_dollar_volume_60d
    - momentum_20d
    - momentum_60d
    - momentum_120d
    - volatility_20d
    - volatility_60d
    - history_rows_asof

history_buckets:
  enabled: true
  thresholds:
    full_10y: 2400
    5_10y: 1260
    2_5y: 504
    lt_2y: 180

bucket_ranking:
  enabled: true
  quotas:
    full_10y: 4
    5_10y: 3
    2_5y: 2
    lt_2y: 1
  refill_order:
    - full_10y
    - 5_10y
    - 2_5y
    - lt_2y

score_calibration:
  enabled: false
  method: bucket_penalty

industry_constraints:
  enabled: true
  max_sector: 4
  max_industry: 2

liquidity_filter:
  enabled: false
  min_latest_close: 1.0
  min_avg_dollar_volume_20d: 5000000
  min_median_dollar_volume_60d: 2000000
  max_zero_volume_ratio_60d: 0.05
  min_recent_trading_days_60d: 40

label:
  expression: Ref($close, -6) / Ref($close, -1) - 1
  name: LABEL0

features:
  handler: Alpha158
  instruments: all

split:
  method: date
  warmup_days: 60
  train:
    start: "2016-05-17"
    end: "2021-12-31"
  valid:
    start: "2022-01-01"
    end: "2023-12-31"
  test:
    start: "2024-01-01"
    end: "2026-05-17"

model:
  class: LGBModel
  kwargs:
    loss: mse
    learning_rate: 0.05
    num_leaves: 64
    max_depth: 8
    n_estimators: 300
    subsample: 0.85
    colsample_bytree: 0.85
    lambda_l1: 1.0
    lambda_l2: 10.0
    num_threads: 8
    seed: 20260519
    bagging_seed: 20260519
    feature_fraction_seed: 20260519
    data_random_seed: 20260519
    drop_seed: 20260519
    deterministic: true
    force_col_wise: true

training:
  seed: 20260519
  deterministic: true
  reuse_test_predictions: true

report:
  top_n: 10

backtest:
  enabled: true
  strategy: bucketed_topk
  top_n: 10
  holding_days: 5
  rebalance_days: 5
  entry_lag_days: 1
  price: close
  cost_bps: 10
  min_positions: 5
  point_in_time_filters:
    enabled: true
    history_bucket_asof: true
    liquidity_asof: true
    min_history_rows: 180
    liquidity:
      min_latest_close: 1.0
      min_avg_dollar_volume_20d: 5000000
      min_median_dollar_volume_60d: 2000000
      max_zero_volume_ratio_60d: 0.05
      min_recent_trading_days_60d: 40

benchmark:
  enabled: true
  source: fred
  symbol: NASDAQCOM
  series_id: NASDAQCOM
  name: Nasdaq Composite Index
  refresh: false

attribution:
  enabled: true
  top_n: 10

strategy_comparison:
  enabled: true
  variants:
    - name: unconstrained_top10
      output_dir_suffix: unconstrained_top10
      description: 原始 Top10，不限制 sector 或 industry，观察模型自然行业暴露。
      industry_constraints:
        enabled: false
    - name: sector_cap_2_top10
      output_dir_suffix: sector_cap_2_top10
      description: 强行业约束 Top10，限制单 sector 最多 2 只、单 industry 最多 2 只。
      industry_constraints:
        enabled: true
        max_sector: 2
        max_industry: 2
    - name: sector_cap_3_top10
      output_dir_suffix: sector_cap_3_top10
      description: 中等行业约束 Top10，限制单 sector 最多 3 只、单 industry 最多 2 只。
      industry_constraints:
        enabled: true
        max_sector: 3
        max_industry: 2
    - name: sector_cap_4_top10
      output_dir_suffix: sector_cap_4_top10
      description: 宽松行业约束 Top10，限制单 sector 最多 4 只、单 industry 最多 2 只。
      industry_constraints:
        enabled: true
        max_sector: 4
        max_industry: 2
    - name: sector_momentum_tilt_top10
      output_dir_suffix: sector_momentum_tilt_top10
      description: 行业增强 Top10，信号日前 60 个交易日强势 sector 可多拿 1 个名额。
      industry_constraints:
        enabled: true
        max_sector: 3
        max_industry: 2
        sector_momentum_tilt:
          enabled: true
          lookback_days: 60
          top_sector_count: 3
          extra_max_sector: 1
          max_sector_cap: 4
    - name: raw_score_sector_cap_2_top10
      output_dir_suffix: raw_score_sector_cap_2_top10
      description: 5.8C 原始分数基线，使用 max_sector=2，不做短历史校准。
      industry_constraints:
        enabled: true
        max_sector: 2
        max_industry: 2
      score_calibration:
        enabled: false
    - name: short_history_penalty_sector_cap_2_top10
      output_dir_suffix: short_history_penalty_sector_cap_2_top10
      description: 5.8C 短历史惩罚，保留 max_sector=2，降低短历史股票 adjusted_score。
      industry_constraints:
        enabled: true
        max_sector: 2
        max_industry: 2
      score_calibration:
        enabled: true
        method: bucket_penalty
        bucket_penalties:
          full_10y: 0.0
          5_10y: 0.0
          2_5y: 0.015
          lt_2y: 0.035
    - name: short_history_strict_sector_cap_2_top10
      output_dir_suffix: short_history_strict_sector_cap_2_top10
      description: 5.8C 更严格短历史惩罚，对 lt_2y 额外启用更高流动性门槛。
      industry_constraints:
        enabled: true
        max_sector: 2
        max_industry: 2
      score_calibration:
        enabled: true
        method: bucket_penalty
        bucket_penalties:
          full_10y: 0.0
          5_10y: 0.0
          2_5y: 0.02
          lt_2y: 0.06
        strict_liquidity_gate:
          enabled: true
          buckets:
            - lt_2y
          min_latest_close: 2.0
          min_avg_dollar_volume_20d: 10000000
          min_median_dollar_volume_60d: 5000000
          max_zero_volume_ratio_60d: 0.02
          min_recent_trading_days_60d: 40

within_sector_review:
  enabled: true
  group_levels:
    - sector
    - industry
  quantiles: 5
  min_group_size: 10
  min_summary_periods: 20

sector_error_review:
  enabled: true
  target_sectors:
    - Technology
    - Health Care
    - Consumer Discretionary
  quantiles: 5
  min_group_size: 10
  min_summary_periods: 20

short_history_review:
  enabled: true
  baseline_variant: raw_score_sector_cap_2_top10
  target_buckets:
    - lt_2y
    - 2_5y
  comparison_buckets:
    - full_10y
    - 5_10y
  quantiles: 5
  min_bucket_samples: 20
