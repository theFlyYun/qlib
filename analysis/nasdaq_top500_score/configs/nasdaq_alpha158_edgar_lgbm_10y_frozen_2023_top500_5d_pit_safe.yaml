experiment:
  name: nasdaq_alpha158_edgar_lgbm_10y_frozen_2023_top500_5d_pit_safe
  output_dir: analysis/nasdaq_top500_score/runs/nasdaq_alpha158_edgar_lgbm_10y_frozen_2023_top500_5d_pit_safe

universe:
  exchange: NASDAQ
  top_n_by_market_cap: 500
  exclude_etf: true
  exclude_test_issue: true
  min_history_rows: 180
  selection:
    method: approximate_market_cap_asof
    as_of_date: "2023-12-31"
    candidate_top_n_by_current_market_cap: 1000
  security_master:
    enabled: true
    source: nasdaq_public
    allowed_asset_types:
      - common_stock
      - ordinary_share
      - adr_ads
      - unknown_equity_like
    allow_adr_ads: true
    require_not_etf: true
    require_not_test_issue: true

data:
  source: nasdaq_public
  start_date: "2016-05-17"
  end_date: "2026-05-17"
  freq: day
  vwap_method: ohlc_mean

fundamentals:
  enabled: true
  source: sec_edgar
  cache_dir: analysis/nasdaq_top500_score/runs/nasdaq_alpha158_edgar_lgbm_10y_eval_all/edgar_cache
  forms:
    - 10-K
    - 10-Q
    - 10-K/A
    - 10-Q/A
  min_filing_count: 4
  enable_valuation: true
  recent_filing_days: 5

history_buckets:
  enabled: true
  thresholds:
    full_10y: 2400
    5_10y: 1260
    2_5y: 504
    lt_2y: 180

bucket_ranking:
  enabled: true
  quotas:
    full_10y: 4
    5_10y: 3
    2_5y: 2
    lt_2y: 1
  refill_order:
    - full_10y
    - 5_10y
    - 2_5y
    - lt_2y

industry_constraints:
  enabled: true
  max_sector: 4
  max_industry: 2

liquidity_filter:
  enabled: false
  min_latest_close: 1.0
  min_avg_dollar_volume_20d: 5000000
  min_median_dollar_volume_60d: 2000000
  max_zero_volume_ratio_60d: 0.05
  min_recent_trading_days_60d: 40

label:
  expression: Ref($close, -6) / Ref($close, -1) - 1
  name: LABEL0

features:
  handler: Alpha158
  instruments: all

split:
  method: date
  warmup_days: 60
  train:
    start: "2016-05-17"
    end: "2021-12-31"
  valid:
    start: "2022-01-01"
    end: "2023-12-31"
  test:
    start: "2024-01-01"
    end: "2026-05-17"

model:
  class: LGBModel
  kwargs:
    loss: mse
    learning_rate: 0.05
    num_leaves: 64
    max_depth: 8
    n_estimators: 300
    subsample: 0.85
    colsample_bytree: 0.85
    lambda_l1: 1.0
    lambda_l2: 10.0
    num_threads: 8

report:
  top_n: 10

backtest:
  enabled: true
  strategy: bucketed_topk
  top_n: 10
  holding_days: 5
  rebalance_days: 5
  entry_lag_days: 1
  price: close
  cost_bps: 10
  min_positions: 5
  point_in_time_filters:
    enabled: true
    history_bucket_asof: true
    liquidity_asof: true
    min_history_rows: 180
    liquidity:
      min_latest_close: 1.0
      min_avg_dollar_volume_20d: 5000000
      min_median_dollar_volume_60d: 2000000
      max_zero_volume_ratio_60d: 0.05
      min_recent_trading_days_60d: 40

benchmark:
  enabled: true
  source: fred
  symbol: NASDAQCOM
  series_id: NASDAQCOM
  name: Nasdaq Composite Index
  refresh: false
